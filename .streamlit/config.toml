[theme]
base = "light"
primaryColor = "#f97316"
backgroundColor = "#faf9f7"
secondaryBackgroundColor = "#f5f3ee"
textColor = "#0a0a0a"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
maxUploadSize = 50
enableXsrfProtection = true

# Esconde menu hamburger (Settings) para impedir o usuario de toggle para dark.
# Combinado com JS de force-light em app.py, garante que o app SEMPRE renderiza
# em light mode mesmo se navegador estiver em dark.
[client]
toolbarMode = "minimal"
